name: Build Repo

on:
  push:
    branches: [main]
    paths:
      - "debs/**"
      - "scripts/**"
      - ".github/workflows/**"
  workflow_dispatch:
  # 上游项目编译出新 deb 后, 用 PAT 把 deb 提交到 debs/ 即触发本流程

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev bzip2

      - name: Build repo index
        run: |
          chmod +x scripts/build_repo.sh
          ./scripts/build_repo.sh .

      - name: Show index
        run: |
          echo "----- debs -----"
          ls -lh debs/
          echo "----- Packages -----"
          cat Packages

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/pub
          cp -r debs Packages Packages.bz2 Packages.gz Release index.html .nojekyll /tmp/pub/ 2>/dev/null || true
          cd /tmp/pub
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy unified Sileo repo"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
